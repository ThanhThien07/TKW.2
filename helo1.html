<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chat 2 người - Messenger Style (P2P)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .chat-app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; background: #f0f2f5; }
        .chat-header { background: white; padding: 12px 16px; border-bottom: 1px solid #e0e0e0; }
        .peer-info { background: #e9ecef; border-radius: 20px; padding: 6px 12px; font-size: 0.8rem; word-break: break-all; display: inline-flex; align-items: center; gap: 8px; }
        .copy-id-btn { background: none; border: none; color: #0d6efd; cursor: pointer; font-size: 14px; }
        .messenger-chat { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; }
        .message-row { display: flex; align-items: flex-start; gap: 8px; max-width: 100%; animation: fadeIn 0.2s ease; }
        .message-row.me { justify-content: flex-end; }
        .message-row.other { justify-content: flex-start; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #d9d9d9; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; color: white; }
        .avatar.me-avatar { background: #0d6efd; order: 2; }
        .avatar.other-avatar { background: #6c757d; }
        .bubble { padding: 8px 12px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-break: break-word; max-width: 100%; }
        .message-row.me .bubble { background: #0d6efd; color: white; border-bottom-right-radius: 4px; }
        .message-row.other .bubble { background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        .sender-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; color: #65676b; }
        .message-row.me .sender-name { text-align: right; color: #8a8d91; }
        .timestamp { font-size: 10px; color: #8a8d91; margin-top: 2px; }
        .message-row.me .timestamp { text-align: right; }
        .message-content { display: flex; flex-direction: column; max-width: 80%; }
        .message-row.me .message-content { align-items: flex-end; }
        .message-row.other .message-content { align-items: flex-start; }
        .chat-footer { background: white; padding: 10px 16px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; align-items: flex-end; }
        #msgInput { flex: 1; border: none; background: #f0f2f5; border-radius: 24px; padding: 10px 16px; font-size: 15px; resize: none; font-family: inherit; max-height: 100px; outline: none; }
        .send-btn { background: #0d6efd; border: none; width: 44px; height: 44px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .send-btn:active { transform: scale(0.95); }
        .connect-area { background: white; padding: 12px 16px; border-bottom: 1px solid #e0e0e0; }
        .input-group-custom { display: flex; gap: 8px; }
        #connectId { flex: 1; border: 1px solid #ccd0d5; border-radius: 24px; padding: 10px 16px; font-size: 14px; outline: none; }
        .connect-btn { background: #0d6efd; border: none; border-radius: 24px; padding: 0 20px; color: white; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .avatar { width: 32px; height: 32px; } .bubble { font-size: 14px; } }
        .messenger-chat::-webkit-scrollbar { width: 6px; }
        .browser-warning { background: #ffc107; text-align: center; padding: 5px; font-size: 12px; display: none; }
    </style>
</head>
<body>
<div class="chat-app">
    <div class="browser-warning" id="browserWarning">⚠️ Trình duyệt trong ứng dụng (Facebook, Zalo...) có thể không hỗ trợ WebRTC. Hãy mở bằng Chrome/Safari.</div>
    <div class="chat-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="fw-bold">💬 Messenger 2 người</div>
        <div class="peer-info">
            <i class="fas fa-id-card me-1"></i> ID của bạn: <span id="myId">Đang tạo...</span>
            <button class="copy-id-btn" id="copyIdBtn" title="Sao chép ID"><i class="far fa-copy"></i></button>
        </div>
    </div>
    <div class="connect-area">
        <div class="input-group-custom">
            <input type="text" id="connectId" placeholder="Nhập ID người kia để kết nối">
            <button class="connect-btn" id="connectBtn">Kết nối</button>
        </div>
        <div class="small text-muted mt-2" id="connStatus"></div>
    </div>
    <div class="messenger-chat" id="chatBox"></div>
    <div class="chat-footer">
        <textarea id="msgInput" placeholder="Nhập tin nhắn..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    (function() {
        // Kiểm tra WebRTC
        if (!window.RTCPeerConnection) {
            document.getElementById('browserWarning').style.display = 'block';
            document.getElementById('connStatus').innerHTML = '❌ Trình duyệt không hỗ trợ WebRTC. Dùng Chrome/Firefox/Safari.';
            return;
        }

        // Khởi tạo Peer với nhiều ICE server
        const peer = new Peer({
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun.ekiga.net' }
                ]
            },
            debug: 1
        });

        let currentConn = null;      // Kết nối hiện tại
        let isConnecting = false;     // Chống gọi connect nhiều lần
        const chatContainer = document.getElementById("chatBox");
        const myIdSpan = document.getElementById("myId");
        const connStatusDiv = document.getElementById("connStatus");
        const connectIdInput = document.getElementById("connectId");
        const copyBtn = document.getElementById("copyIdBtn");

        // Hiển thị ID khi peer sẵn sàng
        peer.on('open', (id) => {
            myIdSpan.innerText = id;
            connStatusDiv.innerHTML = '✅ Sẵn sàng. Sao chép ID của bạn và gửi cho bạn chat.';
        });

        // Xử lý khi có người khác gọi đến
        peer.on('connection', (incomingConn) => {
            // Nếu đã có kết nối, đóng kết nối cũ
            if (currentConn && currentConn.open) {
                currentConn.close();
            }
            currentConn = incomingConn;
            setupConnection(currentConn, false);
            connStatusDiv.innerHTML = '<i class="fas fa-link text-success"></i> Đã kết nối! Bạn có thể nhắn tin.';
        });

        peer.on('error', (err) => {
            console.error(err);
            let msg = '';
            if (err.type === 'peer-unavailable') msg = '⚠️ Không tìm thấy ID người kia. Kiểm tra lại.';
            else if (err.type === 'network') msg = '⚠️ Lỗi mạng, hãy thử lại.';
            else msg = '⚠️ Lỗi: ' + (err.message || err.type);
            connStatusDiv.innerHTML = msg;
            isConnecting = false;
        });

        // Hàm kết nối chủ động
        window.connect = function() {
            const remoteId = connectIdInput.value.trim();
            if (!remoteId) {
                connStatusDiv.innerHTML = '⚠️ Vui lòng nhập ID người kia';
                return;
            }
            if (isConnecting) {
                connStatusDiv.innerHTML = '⏳ Đang kết nối, vui lòng chờ...';
                return;
            }
            if (currentConn && currentConn.open) {
                connStatusDiv.innerHTML = 'ℹ️ Đã có kết nối. Hãy ngắt trước nếu muốn kết nối mới.';
                return;
            }
            isConnecting = true;
            connStatusDiv.innerHTML = '⏳ Đang kết nối...';
            const newConn = peer.connect(remoteId);
            currentConn = newConn;
            setupConnection(newConn, true);
        };

        function setupConnection(conn, isInitiator) {
            if (!conn) return;

            conn.on('open', () => {
                isConnecting = false;
                connStatusDiv.innerHTML = '✅ Kết nối thành công! Chat ngay.';
            });
            conn.on('data', (data) => {
                addMessage(data, "other");
            });
            conn.on('error', (err) => {
                console.error("Connection error:", err);
                connStatusDiv.innerHTML = '❌ Lỗi kết nối: ' + (err.message || 'không xác định');
                currentConn = null;
                isConnecting = false;
            });
            conn.on('close', () => {
                connStatusDiv.innerHTML = '🔌 Đã ngắt kết nối. Hãy kết nối lại nếu cần.';
                currentConn = null;
                isConnecting = false;
            });
        }

        // Gửi tin nhắn
        window.sendMsg = function() {
            const input = document.getElementById("msgInput");
            const msg = input.value.trim();
            if (!msg) return;
            if (!currentConn || !currentConn.open) {
                connStatusDiv.innerHTML = '⚠️ Chưa kết nối hoặc đã mất kết nối. Hãy nhập ID và kết nối lại.';
                return;
            }
            currentConn.send(msg);
            addMessage(msg, "me");
            input.value = "";
            input.style.height = "auto";
        };

        // Hiển thị tin nhắn (giống Messenger)
        function addMessage(msg, senderType) {
            const row = document.createElement("div");
            row.className = `message-row ${senderType}`;

            // Avatar
            const avatar = document.createElement("div");
            avatar.className = `avatar ${senderType === "me" ? "me-avatar" : "other-avatar"}`;
            avatar.innerHTML = senderType === "me" ? '<i class="fas fa-user-alt"></i>' : '<i class="fas fa-user-friends"></i>';

            // Nội dung
            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";
            const nameDiv = document.createElement("div");
            nameDiv.className = "sender-name";
            nameDiv.innerText = senderType === "me" ? "Bạn" : "Đối phương";
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.innerText = msg;
            const timeSpan = document.createElement("div");
            timeSpan.className = "timestamp";
            const now = new Date();
            timeSpan.innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

            contentDiv.appendChild(nameDiv);
            contentDiv.appendChild(bubble);
            contentDiv.appendChild(timeSpan);

            if (senderType === "me") {
                row.appendChild(contentDiv);
                row.appendChild(avatar);
            } else {
                row.appendChild(avatar);
                row.appendChild(contentDiv);
            }
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Sao chép ID
        copyBtn.addEventListener('click', () => {
            const id = myIdSpan.innerText;
            if (id && id !== "Đang tạo...") {
                navigator.clipboard.writeText(id).then(() => {
                    connStatusDiv.innerHTML = '📋 Đã sao chép ID vào clipboard!';
                    setTimeout(() => {
                        if (currentConn && currentConn.open) connStatusDiv.innerHTML = '✅ Đang kết nối...';
                        else connStatusDiv.innerHTML = '✅ Sẵn sàng. Sao chép ID của bạn và gửi cho bạn chat.';
                    }, 2000);
                }).catch(() => alert('Không thể sao chép, hãy tự copy thủ công.'));
            } else {
                alert('ID chưa sẵn sàng, vui lòng đợi 1 giây.');
            }
        });

        // Xử lý textarea tự động co giãn và gửi tin
        const textarea = document.getElementById("msgInput");
        textarea.addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 100) + "px";
        });
        textarea.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        });
        document.getElementById("sendBtn").addEventListener("click", sendMsg);
        document.getElementById("connectBtn").addEventListener("click", connect);
    })();
</script>
</body>
</html>
